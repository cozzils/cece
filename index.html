<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎨 ColoraFun</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#FFF5E6;--primary:#FF6B6B;--primary2:#FF8E53;
  --teal:#4ECDC4;--yellow:#FFE66D;--dark:#2C3E50;
  --panel:#FFFFFF;--radius:18px;
  --shadow:0 4px 24px rgba(0,0,0,0.13);
}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Comic Sans MS','Chalkboard SE','Bradley Hand',cursive;
  background:var(--bg);
  touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
}

/* ===== SCREENS ===== */
.screen{position:absolute;inset:0;overflow:hidden;}
#gallery{overflow-y:auto;background:linear-gradient(160deg,#FFF5E6 0%,#FFE8D6 100%);}
#coloring-page{display:flex;flex-direction:column;height:100%;height:100dvh;}

/* ===== GALLERY ===== */
.g-header{
  background:linear-gradient(135deg,#FF6B6B,#FF8E53);
  padding:28px 20px 22px;
  text-align:center;color:#fff;
  position:sticky;top:0;z-index:10;
  box-shadow:0 4px 16px rgba(255,107,107,.35);
}
.g-header h1{font-size:2.2rem;text-shadow:2px 3px 0 rgba(0,0,0,.18);letter-spacing:1px;}
.g-header p{font-size:.9rem;opacity:.9;margin-top:5px;}

.drawing-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:18px 14px 30px;
  max-width:640px;margin:0 auto;
}
@media(min-width:480px){.drawing-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:700px){.drawing-grid{grid-template-columns:repeat(4,1fr);}}

.d-card{
  background:#fff;border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow);
  cursor:pointer;
  transition:transform .18s,box-shadow .18s;
  border:3px solid transparent;
}
.d-card:active{transform:scale(.93);box-shadow:0 2px 8px rgba(0,0,0,.12);}
@media(hover:hover){.d-card:hover{transform:translateY(-4px);box-shadow:0 10px 32px rgba(0,0,0,.18);}}

.d-preview{
  width:100%;aspect-ratio:1;
  display:flex;align-items:center;justify-content:center;
  padding:10px;background:#FAFAFA;
}
.d-preview svg{width:100%;height:100%;}
.d-name{
  text-align:center;padding:7px 4px 9px;
  font-size:.78rem;font-weight:bold;color:var(--dark);
  background:#fff;
}

/* ===== COLORING PAGE ===== */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,#FF6B6B,#FF8E53);
  padding:10px 14px;color:#fff;flex-shrink:0;
  box-shadow:0 3px 12px rgba(255,107,107,.3);
}
.top-bar button{
  background:rgba(255,255,255,.28);border:none;color:#fff;
  border-radius:50px;padding:8px 16px;
  font-size:.85rem;cursor:pointer;font-family:inherit;font-weight:bold;
  transition:background .15s;
}
.top-bar button:active{background:rgba(255,255,255,.5);}
.top-bar h2{font-size:1.05rem;text-shadow:1px 1px 0 rgba(0,0,0,.18);}

.drawing-area{
  flex:1;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:#fff;position:relative;
}

/* ===== CANVAS LAYER ===== */
#paint-canvas{
  position:absolute;
  inset:0;
  z-index:1;
  cursor:crosshair;
  touch-action:none;
  display:block;
}

/* ===== SVG OVERLAY (outlines only, via multiply) ===== */
#svg-wrap{
  position:absolute;
  inset:0;
  z-index:2;
  pointer-events:none;
  mix-blend-mode:multiply;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:6px;
}
#svg-wrap svg{
  max-width:100%;max-height:100%;
  width:auto;height:auto;
  display:block;
}

/* ===== TOOLBAR ===== */
.toolbar{
  background:#fff;
  box-shadow:0 -3px 18px rgba(0,0,0,.09);
  padding:10px 12px 14px;flex-shrink:0;
}
.tool-row{display:flex;gap:6px;justify-content:center;margin-bottom:10px;flex-wrap:wrap;}
.t-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:#F0F0F0;border:2.5px solid transparent;
  border-radius:14px;padding:7px 12px;cursor:pointer;
  font-size:.62rem;font-weight:bold;color:#666;
  font-family:inherit;transition:all .15s;min-width:54px;
}
.t-btn .ico{font-size:1.2rem;}
.t-btn:active{transform:scale(.91);}
.t-btn.on{background:#FFE66D;border-color:#E6C800;color:#333;}
#eraser.on{background:#FFB3C1;border-color:#FF6B8A;}

/* ===== BRUSH SIZE BUTTONS ===== */
.sz-dot{display:inline-block;background:currentColor;border-radius:50%;flex-shrink:0;}
#sz-s .sz-dot{width:8px;height:8px;}
#sz-m .sz-dot{width:14px;height:14px;}
#sz-l .sz-dot{width:22px;height:22px;}

/* ===== PALETTE ===== */
.pal-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px 0;}
.pal-wrap::-webkit-scrollbar{display:none;}
.palette{display:flex;gap:9px;padding:2px 4px;min-width:max-content;}
.swatch{
  width:46px;height:46px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
  flex-shrink:0;transition:transform .15s,box-shadow .15s;
}
.swatch:active{transform:scale(.85);}
.swatch.on{
  border-color:#111;transform:scale(1.18);
  box-shadow:0 0 0 2.5px #fff,0 0 0 5px #111;
}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:130px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:#2C3E50;color:#fff;
  padding:10px 22px;border-radius:50px;
  font-size:.82rem;opacity:0;pointer-events:none;
  transition:all .28s;z-index:999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ===== FADE ANIM ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.fade{animation:fadeUp .3s ease;}
</style>
</head>

<div id="gallery" class="screen">
  <div class="g-header">
    <h1>🎨 ColoraFun</h1>
    <p>Scegli un disegno e inizia a colorare!</p>
  </div>
  <div class="drawing-grid" id="grid"></div>
</div>

<!-- COLORING -->
<div id="coloring-page" class="screen" style="display:none">
  <div class="top-bar">
    <button id="back-btn">← Indietro</button>
    <h2 id="title-lbl">Disegno</h2>
    <button id="save-btn">💾 Salva</button>
  </div>
  <div class="drawing-area">
    <!-- Canvas: layer di pittura (sotto) -->
    <!-- Aggiunto dinamicamente da JS -->
    <!-- SVG: contorni (sopra, con mix-blend-mode: multiply) -->
    <div id="svg-wrap"></div>
  </div>
  <div class="toolbar">
    <div class="tool-row">
      <button class="t-btn on" id="paint-btn"><span class="ico">🖌️</span><span>Colora</span></button>

      <button class="t-btn" id="clear-btn"><span class="ico">🗑️</span><span>Azzera</span></button>
      <button class="t-btn" id="sz-s"><span class="ico"><span class="sz-dot" style="color:#666"></span></span><span>Piccolo</span></button>
      <button class="t-btn on" id="sz-m"><span class="ico"><span class="sz-dot" style="color:#666"></span></span><span>Medio</span></button>
      <button class="t-btn" id="sz-l"><span class="ico"><span class="sz-dot" style="color:#666"></span></span><span>Grande</span></button>
    </div>
    <div class="pal-wrap">
      <div class="palette" id="palette"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

/* =================== STATE =================== */
let currentColor = '#FF3333';
let isEraser = false;
let currentDrawing = null;
let paintCanvas = null;
let paintCtx = null;
let isDrawing = false;
let lastX = 0, lastY = 0;
let currentBrushSize = 20;
const BRUSH_SIZES = { s: 8, m: 20, l: 40 };

/* =================== INIT =================== */
function init(){
  buildPalette();
  buildGallery();
  setupToolbar();
}

/* =================== PALETTE =================== */
function buildPalette(){
  const pal = document.getElementById('palette');
  COLORS.forEach((c,i) => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (i===0 ? ' on' : '');
    sw.style.background = c;
    sw.style.border = c==='#FFFFFF' ? '3px solid #ddd' : '3px solid transparent';
    sw.addEventListener('click', () => selectColor(c, sw));
    sw.addEventListener('touchend', e => { e.preventDefault(); selectColor(c, sw); });
    pal.appendChild(sw);
  });
}

function selectColor(c, sw){
  currentColor = c;
  isEraser = false;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('on'));
  sw.classList.add('on');
  document.getElementById('paint-btn').classList.add('on');
  document.getElementById('eraser').classList.remove('on');
  updateCursor();
}

/* =================== CANVAS SETUP =================== */
function setupCanvas(){
  const area = document.querySelector('.drawing-area');

  // Remove old canvas if present
  const old = document.getElementById('paint-canvas');
  if (old) { old.remove(); }

  paintCanvas = document.createElement('canvas');
  paintCanvas.id = 'paint-canvas';
  paintCanvas.width  = area.clientWidth;
  paintCanvas.height = area.clientHeight;

  // Insert BEFORE svg-wrap so SVG overlay sits on top
  area.insertBefore(paintCanvas, document.getElementById('svg-wrap'));

  paintCtx = paintCanvas.getContext('2d');
  // White background
  paintCtx.fillStyle = '#ffffff';
  paintCtx.fillRect(0, 0, paintCanvas.width, paintCanvas.height);

  // Load saved state if any
  if (currentDrawing){
    const saved = loadState(currentDrawing.id);
    if (saved){
      const img = new Image();
      img.onload = () => paintCtx.drawImage(img, 0, 0, paintCanvas.width, paintCanvas.height);
      img.src = saved;
    }
  }

  // Pointer events (works for both mouse and touch)
  paintCanvas.addEventListener('pointerdown',  onPointerDown);
  paintCanvas.addEventListener('pointermove',  onPointerMove);
  paintCanvas.addEventListener('pointerup',    onPointerUp);
  paintCanvas.addEventListener('pointerleave', onPointerUp);
  paintCanvas.addEventListener('pointercancel',onPointerUp);
  updateCursor();
}

function getCanvasPos(e){
  const rect = paintCanvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (paintCanvas.width  / rect.width),
    y: (e.clientY - rect.top)  * (paintCanvas.height / rect.height)
  };
}

function onPointerDown(e){
  e.preventDefault();
  paintCanvas.setPointerCapture(e.pointerId);
  isDrawing = true;
  const pos = getCanvasPos(e);
  lastX = pos.x;
  lastY = pos.y;
  // Draw a dot at touch/click start
  paintCtx.beginPath();
  paintCtx.arc(lastX, lastY, currentBrushSize / 2, 0, Math.PI * 2);
  paintCtx.fillStyle = isEraser ? '#ffffff' : currentColor;
  paintCtx.fill();
}

function onPointerMove(e){
  if (!isDrawing) return;
  e.preventDefault();
  const pos = getCanvasPos(e);
  paintCtx.beginPath();
  paintCtx.moveTo(lastX, lastY);
  paintCtx.lineTo(pos.x, pos.y);
  paintCtx.strokeStyle = isEraser ? '#ffffff' : currentColor;
  paintCtx.lineWidth   = currentBrushSize;
  paintCtx.lineCap     = 'round';
  paintCtx.lineJoin    = 'round';
  paintCtx.stroke();
  lastX = pos.x;
  lastY = pos.y;
}

function onPointerUp(e){
  if (isDrawing){
    isDrawing = false;
    saveState();
  }
}

function updateCursor(){
  if (!paintCanvas) return;
  paintCanvas.style.cursor = isEraser ? 'cell' : 'crosshair';
}

/* =================== GALLERY =================== */
function buildGallery(){
  const grid = document.getElementById('grid');
  DRAWINGS.forEach(d => {
    const card = document.createElement('div');
    card.className = 'd-card fade';
    const hasSaved = !!loadState(d.id);
    card.innerHTML = `
      <div class="d-preview">${d.svg}</div>
      <div class="d-name">${d.name}${hasSaved ? ` <span style="color:#FF6B6B;font-size:.65rem;">(colorato!)</span>` : ''}</div>
    `;
    card.addEventListener('click', () => openDrawing(d));
    card.addEventListener('touchend', e => { e.preventDefault(); openDrawing(d); });
    grid.appendChild(card);
  });
}

/* =================== COLORING PAGE =================== */
function openDrawing(d){
  currentDrawing = d;
  const wrap = document.getElementById('svg-wrap');
  wrap.innerHTML = d.svg;
  document.getElementById('title-lbl').textContent = d.name;

  document.getElementById('gallery').style.display = 'none';
  const cp = document.getElementById('coloring-page');
  cp.style.display = 'flex';
  cp.classList.add('fade');
  setTimeout(() => cp.classList.remove('fade'), 400);

  // Setup canvas AFTER page is visible (so clientWidth/Height are correct)
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      setupCanvas();
    });
  });
}

/* =================== TOOLBAR =================== */
function setupToolbar(){
  document.getElementById('back-btn').addEventListener('click', goBack);
  document.getElementById('eraser').addEventListener('click', toggleEraser);
  document.getElementById('clear-btn').addEventListener('click', clearDrawing);
  document.getElementById('save-btn').addEventListener('click', savePNG);
  document.getElementById('paint-btn').addEventListener('click', () => {
    isEraser = false;
    document.getElementById('paint-btn').classList.add('on');
    document.getElementById('eraser').classList.remove('on');
    updateCursor();
  });

  ['s','m','l'].forEach(sz => {
    document.getElementById(`sz-${sz}`).addEventListener('click', () => setBrushSize(sz));
  });
}

function setBrushSize(sz){
  currentBrushSize = BRUSH_SIZES[sz];
  document.querySelectorAll('[id^="sz-"]').forEach(b => b.classList.remove('on'));
  document.getElementById(`sz-${sz}`).classList.add('on');
}

function goBack(){
  document.getElementById('coloring-page').style.display = 'none';
  const g = document.getElementById('gallery');
  g.style.display = 'block';
  document.getElementById('grid').innerHTML = '';
  buildGallery();
}

function toggleEraser(){
  isEraser = !isEraser;
  document.getElementById('eraser').classList.toggle('on', isEraser);
  document.getElementById('paint-btn').classList.toggle('on', !isEraser);
  updateCursor();
}

function clearDrawing(){
  if (!confirm('Vuoi cancellare tutti i colori?')) return;
  if (!paintCtx) return;
  paintCtx.fillStyle = '#ffffff';
  paintCtx.fillRect(0, 0, paintCanvas.width, paintCanvas.height);
  localStorage.removeItem(`colorafun-${currentDrawing.id}`);
  toast('🗑️ Disegno azzerato!');
}

/* =================== SAVE PNG =================== */
function savePNG(){
  const svgEl = document.querySelector('#svg-wrap svg');
  if (!svgEl || !paintCanvas){ toast('Nessun disegno aperto.'); return; }
  try{
    const size = 1000;
    const outCanvas = document.createElement('canvas');
    outCanvas.width  = size;
    outCanvas.height = size;
    const ctx = outCanvas.getContext('2d');

    // 1. White background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, size, size);

    // 2. Paint layer
    ctx.drawImage(paintCanvas, 0, 0, size, size);

    // 3. SVG outlines on top with multiply
    const clone = svgEl.cloneNode(true);
    clone.setAttribute('width',  size);
    clone.setAttribute('height', size);
    const svgStr = new XMLSerializer().serializeToString(clone);
    const blob   = new Blob([svgStr], {type:'image/svg+xml;charset=utf-8'});
    const url    = URL.createObjectURL(blob);
    const img    = new Image();
    img.onload = () => {
      ctx.globalCompositeOperation = 'multiply';
      ctx.drawImage(img, 0, 0, size, size);
      ctx.globalCompositeOperation = 'source-over';
      URL.revokeObjectURL(url);
      const a = document.createElement('a');
      a.download = `colorafun-${currentDrawing.id}.png`;
      a.href     = outCanvas.toDataURL('image/png');
      a.click();
      toast('✅ Immagine salvata!');
    };
    img.onerror = () => toast('❌ Errore nel salvataggio.');
    img.src = url;
  } catch(err){
    console.error(err);
    toast('❌ Salvataggio non riuscito.');
  }
}

/* =================== LOCALSTORAGE =================== */
function saveState(){
  if (!paintCanvas || !currentDrawing) return;
  try{
    // Save canvas as dataURL (quality 0.6 for space saving)
    localStorage.setItem(`colorafun-${currentDrawing.id}`, paintCanvas.toDataURL('image/jpeg', 0.6));
  } catch(e){
    // LocalStorage quota exceeded – silently ignore
  }
}

function loadState(id){
  try{
    return localStorage.getItem(`colorafun-${id}`); // returns dataURL or null
  } catch{ return null; }
}

/* =================== TOAST =================== */
function toast(msg, duration=2200){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

/* =================== START =================== */
init();
</script>
